name: Build GitHub stats

on:
  schedule:
    - cron: "17 3 * * *" # daily at 03:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/build-stats.mjs"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

concurrency:
  group: build-stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build stats.json
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/build-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/stats.json)" ]; then
            git add docs/stats.json
            git commit -m "chore(stats): update GitHub stats [skip ci]"
            git push
          else
            echo "No stats changes."
          fi
